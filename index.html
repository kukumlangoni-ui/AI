<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STEA AI Assistant</title>
    <meta name="description" content="STEA - SwahiliTech Elite Academy AI Assistant" />
    <meta name="theme-color" content="#050505" />
    <style>
      /* Prevent black flash while JS loads */
      html, body { margin: 0; background: #050505; }
      #app-loading {
        position: fixed;
        inset: 0;
        background: #050505;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        font-family: 'Inter', sans-serif;
        z-index: 9999;
      }
      #app-loading .badge {
        background: #ffd700;
        color: #000;
        font-weight: 800;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 1.1rem;
        letter-spacing: 0.1em;
      }
      #app-loading .dots {
        display: flex;
        gap: 6px;
      }
      #app-loading .dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255,215,0,0.4);
        animation: pulse 1.2s ease-in-out infinite;
      }
      #app-loading .dots span:nth-child(2) { animation-delay: 0.2s; }
      #app-loading .dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.3); }
      }
    </style>
  </head>
  <body>
    <!-- Splash shown while React loads -->
    <div id="app-loading">
      <div class="badge">STEA</div>
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Remove splash once React mounts
      window.__removeSplash = function() {
        var el = document.getElementById('app-loading');
        if (el) el.remove();
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
